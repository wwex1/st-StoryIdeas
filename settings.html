<div class="story_ideas_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Story Ideas</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <div class="flex-container">
                <label class="checkbox_label flexBasis25p" for="si_enabled">
                    <input type="checkbox" id="si_enabled" class="si_enabled" />
                    <span>활성화</span>
                </label>
                <select id="si_source" class="si_source text_pole flex1"></select>
            </div>

            <div class="flex-container">
                <div class="flex-container flexFlowColumn flex1">
                    <small>개수</small>
                    <input type="number" class="si_count text_pole" min="3" max="8" value="3" />
                </div>
                <div class="flex-container flexFlowColumn flex1">
                    <small>길이</small>
                    <select class="si_detail_level text_pole">
                        <option value="brief">간략</option>
                        <option value="normal">보통</option>
                    </select>
                </div>
                <div class="flex-container flexFlowColumn flex1">
                    <small>언어</small>
                    <select class="si_lang text_pole">
                        <option value="en">EN</option>
                        <option value="ko">KO</option>
                    </select>
                </div>
            </div>

            <div class="flex-container flexFlowColumn">
                <div class="flex-container">
                    <small class="flex1">프롬프트 저장</small>
                    <select class="si_prompt_preset text_pole flex1"></select>
                    <button class="si_preset_load menu_button fa-solid fa-folder-open" title="불러오기"></button>
                    <button class="si_preset_save menu_button fa-solid fa-floppy-disk" title="저장"></button>
                    <button class="si_preset_del menu_button fa-solid fa-trash" title="삭제"></button>
                </div>
                <textarea class="si_prompt text_pole" rows="6" placeholder="추천 방향을 설정하세요..."></textarea>
                <div class="flex-container flexFlowRowReverse">
                    <button class="si_prompt_reset menu_button">초기화</button>
                </div>
            </div>

        </div>
    </div>
</div>
