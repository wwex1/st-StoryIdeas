<div class="story_ideas_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>💡 Story Ideas</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <div class="flex-container">
                <label class="checkbox_label flexBasis25p" for="si_enabled">
                    <input type="checkbox" id="si_enabled" class="si_enabled" />
                    <span>활성화</span>
                </label>
                <select id="si_source" class="si_source text_pole flex1">
                    <option value="main">Main API</option>
                    <option value="profile">Connection Profile</option>
                </select>
            </div>

            <div id="si_profile_area" style="display:none;">
                <select class="si_connection_profile text_pole wide100p"></select>
            </div>

            <div class="flex-container">
                <div class="flex-container flexFlowColumn flex1">
                    <small>개수</small>
                    <input type="number" class="si_count text_pole" min="3" max="8" value="3" />
                </div>
                <div class="flex-container flexFlowColumn flex1">
                    <small>언어</small>
                    <select class="si_lang text_pole">
                        <option value="en">EN</option>
                        <option value="ko">KO</option>
                    </select>
                </div>
            </div>

            <div class="flex-container flexFlowColumn">
                <small>커스텀 프롬프트</small>
                <textarea class="si_prompt text_pole" rows="6" placeholder="추천 방향을 설정하세요..."></textarea>
                <div class="flex-container flexFlowRowReverse">
                    <button class="si_prompt_reset menu_button">초기화</button>
                </div>
            </div>

        </div>
    </div>
</div>
